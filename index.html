<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Tay 3D - Đồng Bộ & Tự Động Lưu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Comfortaa:wght@400;700&family=Dancing+Script:wght@700&family=Lobster&family=Montserrat:wght@400;700&family=Noto+Sans+VN:wght@400;700&family=Pacifico&family=Playfair+Display:ital,wght@0,700;1,400&family=Caveat:wght@700&family=Patrick+Hand&family=Amatic+SC:wght@700&family=Quicksand:wght=500;700&family=Bungee&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-width: 380px;
            --primary: #6366f1;
        }
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0; padding: 0; font-family: 'Noto Sans VN', sans-serif;
            background-color: #0f172a; display: flex; height: 100vh; overflow: hidden; color: #f1f5f9;
        }

        /* SIDEBAR ĐIỀU KHIỂN CANVA */
        .sidebar {
            width: var(--sidebar-width); background: #1e293b; border-right: 1px solid #334155;
            display: flex; flex-direction: column; padding: 20px; gap: 12px; overflow-y: auto; z-index: 110;
        }
        h2 { margin: 0; color: #ffffff; font-size: 18px; display: flex; align-items: center; gap: 10px;}
        .section { background: #334155; padding: 12px; border-radius: 8px; border: 1px solid #475569; }
        .label { font-size: 11px; font-weight: bold; color: #cbd5e1; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .btn {
            background: var(--primary); color: white; border: none; padding: 10px;
            border-radius: 6px; cursor: pointer; font-weight: bold; display: flex;
            align-items: center; justify-content: center; gap: 8px; width: 100%; margin-bottom: 5px; transition: 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #10b981; }
        .btn-danger { background: #ef4444; }
        .btn-group { display: flex; gap: 5px; }

        input, select, textarea {
            width: 100%; padding: 8px 12px; border: 1px solid #475569; background: #1e293b;
            color: white; border-radius: 6px; box-sizing: border-box; font-size: 13px; margin-bottom: 5px;
        }

        .asset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-height: 150px; overflow-y: auto; }
        .asset-item {
            background: #1e293b; border: 1px solid #475569; border-radius: 6px;
            padding: 8px; text-align: center; cursor: pointer; font-size: 20px; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .asset-item:hover { transform: scale(1.15); border-color: var(--primary); background: #334155; }

        /* KHÔNG GIAN BÀN THIẾT KẾ 3D PERSPECTIVE */
        .workspace { 
            flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; padding: 20px; background: radial-gradient(circle, #243249 0%, #0f172a 100%);
        }
        
        .page-navigation { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; z-index: 120; }
        .page-indicator { font-size: 14px; font-weight: bold; color: #cbd5e1; background: #1e293b; padding: 6px 16px; border-radius: 20px; border: 1px solid #334155; }

        /* KHUNG SÁCH LẬT 3D */
        .book-container { 
            width: 960px; height: 580px; position: relative; 
            perspective: 2000px; transform-style: preserve-3d;
        }
        .book-spine {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 14px;
            background: linear-gradient(to right, rgba(0,0,0,0.5) 0%, rgba(255,255,255,0.2) 50%, rgba(0,0,0,0.5) 100%);
            z-index: 100; transform: translateX(-50%); box-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        /* LỚP SHEET GIẤY LẬT ĐỘNG 3D */
        .book-page-sheet {
            position: absolute; width: 50%; height: 100%; top: 0; 
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5; background: transparent;
        }
        .book-page-sheet.left-side { left: 0; transform-origin: right center; border-radius: 12px 2px 2px 12px; }
        .book-page-sheet.right-side { left: 50%; transform-origin: left center; border-radius: 2px 12px 12px 2px; }

        .book-page-sheet.flipped-left { transform: rotateY(-180deg); z-index: 10; }
        .book-page-sheet.flipped-right { transform: rotateY(180deg); z-index: 10; }

        .page-face {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; 
            backface-visibility: hidden; padding: 45px; overflow: hidden; 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.05), 0 10px 25px rgba(0,0,0,0.3);
            border: 2px solid transparent;
        }
        .page-face.active-target {
            border: 2px dashed rgba(99, 102, 241, 0.5);
        }

        /* THÀNH PHẦN KÉO THẢ */
        .element { position: absolute; cursor: move; padding: 5px; border: 1px dashed transparent; }
        .element.selected { border: 2px solid var(--primary); background: rgba(99, 102, 241, 0.04); z-index: 999; }
        
        .element .delete-btn {
            position: absolute; top: -14px; right: -14px; background: #ef4444; color: white;
            border-radius: 50%; width: 22px; height: 22px; font-size: 11px; display: none;
            align-items: center; justify-content: center; cursor: pointer; z-index: 1000;
        }
        .element.selected .delete-btn { display: flex; }

        .element-text { font-size: 18px; outline: none; word-break: break-word; user-select: text; min-width: 60px; color: #000; }
        .element-img { width: 140px; height: auto; pointer-events: none; border-radius: 6px; display: block; }
        .element-icon { font-size: 48px; line-height: 1; color: var(--primary); }

        .room-bar {
            position: absolute; top: 20px; left: 20px; background: #1e293b; padding: 10px 15px;
            border-radius: 6px; display: flex; flex-direction: column; gap: 3px; border: 1px solid #334155; font-size: 13px; z-index: 200;
        }
        .save-indicator { font-size: 11px; color: #10b981; font-weight: bold; margin-top: 2px; }
        .page-num { position: absolute; bottom: 15px; font-size: 12px; color: #64748b; font-weight: bold; }
        .left-side .page-num { left: 20px; } .right-side .page-num { right: 20px; }
        
        .cover-style { color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .invisible-sheet { opacity: 0 !important; pointer-events: none !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2><i class="fa-solid fa-book-open" style="color:var(--primary)"></i> Sổ Tay Đồng Bộ 3D</h2>
        
        <!-- THÀNH PHẦN CHIA SẺ -->
        <div class="section" style="background: #1e1b4b; border-color: #4338ca;">
            <span class="label"><i class="fa-solid fa-share-nodes"></i> Chia sẻ quyền chỉnh sửa:</span>
            <button class="btn btn-secondary" onclick="copyShareLink()"><i class="fa-solid fa-copy"></i> Copy Link gửi cho bạn bè</button>
            <div id="roleBadge" style="font-size: 11px; margin-top: 5px; text-align: center; color: #a5b4fc;">Quyền: Đang xác thực...</div>
        </div>

        <!-- THIẾT KẾ TRANG BÌA -->
        <div class="section" id="coverConfigSection" style="display:none; background: #2e1065; border-color: #6b21a8;">
            <span class="label" style="color:#d8b4fe;"><i class="fa-solid fa-star"></i> Thiết kế trang bìa:</span>
            <input type="text" id="coverTitleField" placeholder="Nhập tên sổ tay..." oninput="updateCoverData()">
            <label class="label">Màu nền trang bìa:</label>
            <input type="color" id="coverBgField" value="#311b92" oninput="updateCoverData()">
        </div>

        <div class="section">
            <span class="label">Quản lý trang sổ:</span>
            <button class="btn btn-secondary" onclick="addPagePair()"><i class="fa-solid fa-plus"></i> Chèn thêm 2 Trang</button>
            <div class="btn-group">
                <button class="btn btn-danger" onclick="deleteSinglePage('left')"><i class="fa-solid fa-eraser"></i> Xóa trang trái</button>
                <button class="btn btn-danger" onclick="deleteSinglePage('right')"><i class="fa-solid fa-eraser"></i> Xóa trang phải</button>
            </div>
        </div>

        <div class="section">
            <span class="label">Thêm nội dung:</span>
            <button class="btn" onclick="addNewElement('text', 'Nhấp đúp viết chữ...')"><i class="fa-solid fa-font"></i> Chèn Khung Chữ</button>
        </div>

        <div class="section">
            <span class="label"><i class="fa-solid fa-images"></i> Chèn hình ảnh:</span>
            <button class="btn btn-secondary" onclick="document.getElementById('fileImageLoader').click()"><i class="fa-solid fa-file-arrow-up"></i> Chọn ảnh từ thiết bị</button>
            <input type="file" id="fileImageLoader" accept="image/*" style="display: none;" onchange="uploadLocalImage(event)">
        </div>

        <div class="section">
            <span class="label"><i class="fa-solid fa-icons"></i> Stickers:</span>
            <div class="asset-grid" id="iconLibraryGrid"></div>
        </div>

        <div class="section" id="editorPanel" style="display:none; background: #475569;">
            <span class="label" style="color:#67e8f9;"><i class="fa-solid fa-sliders"></i> Tùy chỉnh đối tượng:</span>
            <select id="fontFamilySelector" onchange="applyFont(this.value)">
                <option value="'Noto Sans VN'">Noto Sans</option>
                <option value="'Dancing Script'">Dancing Script</option>
                <option value="'Pacifico'">Pacifico</option>
                <option value="'Playfair Display'">Playfair Display</option>
                <option value="'Bungee'">Bungee</option>
            </select>
            <div style="display:flex; gap: 5px; margin-top: 5px;">
                <button class="btn" style="background:#1e293b;" onclick="applySize(2)"><i class="fa-solid fa-plus"></i> To</button>
                <button class="btn" style="background:#1e293b;" onclick="applySize(-2)"><i class="fa-solid fa-minus"></i> Nhỏ</button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
                <div>
                    <label class="label">Màu sắc:</label>
                    <input type="color" id="textColorPicker" oninput="applyColor(this.value)">
                </div>
                <div>
                    <label class="label">Nền trang:</label>
                    <input type="color" id="pageBgColorPicker" oninput="applyPageBg(this.value)">
                </div>
            </div>
        </div>
    </div>

    <div class="workspace">
        <div class="room-bar">
            <span id="statusBadge" style="color: #10b981;"><i class="fa-solid fa-circle"></i> Trực tuyến Realtime</span>
            <span id="roomDisplay" style="color: #94a3b8; font-size:11px;">Phòng: Đang tải...</span>
            <span id="saveIndicator" class="save-indicator"><i class="fa-solid fa-cloud-arrow-up"></i> Đã lưu mọi thay đổi</span>
        </div>

        <div class="page-navigation">
            <button class="btn" style="width:90px; margin:0;" onclick="turnPage(-1)"><i class="fa-solid fa-chevron-left"></i> Trước</button>
            <div class="page-indicator" id="pageIndicator">Đang tải...</div>
            <button class="btn" style="width:90px; margin:0;" onclick="turnPage(1)">Sau <i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="book-container" onclick="clearSelection(event)">
            <div class="book-spine"></div>
            <div class="book-page-sheet left-side" id="sheetLeft" ondragover="allowDrop(event)" ondrop="dropElement(event)">
                <div class="page-face" id="pLeftFront" onclick="setActiveTargetPage('left')"></div>
            </div>
            <div class="book-page-sheet right-side" id="sheetRight" ondragover="allowDrop(event)" ondrop="dropElement(event)">
                <div class="page-face" id="pRightFront" onclick="setActiveTargetPage('right')"></div>
            </div>
        </div>
    </div>

    <script>
        let ably = new Ably.Realtime('h3sO_g.W8vN2A:vLbe_Z6u1ZfscwM-N-iO7R7mS4X8g17oNOnK7952jXw');
        let channel = null;
        let roomCode = '';
        let selectedId = null;
        let userActiveSide = 'left'; 

        // Khung dữ liệu mặc định ban đầu
        let notebook = {
            currentPagePair: 0,
            pages: [
                { isBlankPlaceholder: true }, 
                { isCover: true, bg: "#311b92", title: "SỔ TAY THIẾT KẾ", titleFont: "'Noto Sans VN'", titleSize: "32", titleColor: "#ffffff", isFirstCover: true, elements: {} }, 
                { bg: "#fcfbf7", elements: {} }, 
                { bg: "#fcfbf7", elements: {} }, 
                { isCover: true, bg: "#1e293b", title: "TRANG KẾT", titleFont: "'Noto Sans VN'", titleSize: "28", titleColor: "#ffffff", isLastCover: true, elements: {} },     
                { isBlankPlaceholder: true }  
            ]
        };

        const flaticonStickerDb = ["fa-star", "fa-heart", "fa-crown", "fa-fire", "fa-bolt", "fa-gift", "fa-cat", "fa-smile", "fa-sun", "fa-moon", "fa-lightbulb", "fa-rocket"];

        function initRoomConfig() {
            const urlParams = new URLSearchParams(window.location.search);
            let roomParam = urlParams.get('room');
            
            if (roomParam) {
                // ĐÂY LÀ BẠN BÈ: Vào phòng bằng đường link chia sẻ
                roomCode = roomParam;
                document.getElementById("roleBadge").innerText = "Quyền: Khách chỉnh sửa 👥";
            } else {
                // ĐÂY LÀ BẠN (CHỦ PHÒNG): Tìm mã phòng vĩnh viễn đã lưu, nếu chưa có thì tạo mới
                let savedRoom = localStorage.getItem('my_permanent_room_code');
                if (!savedRoom) {
                    savedRoom = 'room_owner_' + Math.random().toString(36).substring(2, 10);
                    localStorage.setItem('my_permanent_room_code', savedRoom);
                }
                roomCode = savedRoom;
                document.getElementById("roleBadge").innerText = "Quyền: Chủ phòng (Owner) 👑";
                
                // Đẩy mã phòng lên thanh URL để bạn luôn có link hoàn chỉnh để copy
                window.history.replaceState({}, document.title, window.location.pathname + "?room=" + roomCode);
            }

            // Đồng thời khôi phục dữ liệu đã lưu gần nhất nếu có (áp dụng cho chủ phòng hoặc lưu tạm)
            let savedData = localStorage.getItem('notebook_cache_' + roomCode);
            if (savedData) {
                try { notebook = JSON.parse(savedData); } catch(e) {}
            }

            renderStickerLibrary();
        }

        function copyShareLink() {
            // Copy chính xác link hiện tại (đã bao gồm mã phòng cố định của bạn)
            navigator.clipboard.writeText(window.location.href);
            alert("Đã sao chép link phòng của bạn! Hãy gửi link này cho bạn bè để cùng vào sửa realtime.");
        }

        function connectRealtime() {
            channel = ably.channels.get('sotay_3d_v3_' + roomCode);
            document.getElementById("roomDisplay").innerText = "Mã: " + roomCode;

            // Lắng nghe cập nhật từ thiết bị khác
            channel.subscribe('update', (msg) => {
                notebook.pages = msg.data.pages;
                localStorage.setItem('notebook_cache_' + roomCode, JSON.stringify(notebook)); // Lưu lại bản mới nhất
                showSaveState(true);
                renderBook3D();
            });

            // Khi một người bạn mới vừa bấm vào link, họ phát tín hiệu yêu cầu đồng bộ dữ liệu cũ
            channel.subscribe('request_sync', () => {
                channel.publish('sync_response', { pages: notebook.pages });
            });

            channel.subscribe('sync_response', (msg) => {
                notebook.pages = msg.data.pages;
                localStorage.setItem('notebook_cache_' + roomCode, JSON.stringify(notebook));
                renderBook3D();
            });

            // Gửi lệnh yêu cầu lấy dữ liệu mới nhất từ những người đang online sẵn trong phòng
            channel.publish('request_sync', {});
            renderBook3D();
        }

        function sync() {
            showSaveState(false);
            // 1. Tự động lưu vào bộ nhớ máy
            localStorage.setItem('notebook_cache_' + roomCode, JSON.stringify(notebook));
            // 2. Phát tán đồng bộ sang máy bạn bè ngay lập tức
            channel.publish('update', { pages: notebook.pages });
            renderBook3D();
            setTimeout(() => showSaveState(true), 400);
        }

        function showSaveState(isSaved) {
            const indicator = document.getElementById("saveIndicator");
            if(isSaved) {
                indicator.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> Đã tự động lưu`;
                indicator.style.color = "#10b981";
            } else {
                indicator.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Đang lưu đồng bộ...`;
                indicator.style.color = "#f59e0b";
            }
        }

        // --- CÁC HÀM XỬ LÝ GIAO DIỆN & KÉO THẢ SÁCH (GIỮ NGUYÊN TỪ BẢN TRƯỚC) ---
        function renderStickerLibrary() {
            const grid = document.getElementById("iconLibraryGrid"); grid.innerHTML = "";
            flaticonStickerDb.forEach(icon => {
                let div = document.createElement("div"); div.className = "asset-item";
                div.innerHTML = `<i class="fa-solid ${icon}"></i>`;
                div.onclick = () => addNewElement('icon', 'fa-solid ' + icon);
                grid.appendChild(div);
            });
        }

        function turnPage(dir) {
            let nextPair = notebook.currentPagePair + dir;
            if (nextPair < 0 || nextPair * 2 >= notebook.pages.length) return;
            let sheetLeft = document.getElementById("sheetLeft"), sheetRight = document.getElementById("sheetRight");
            if (dir === 1) sheetRight.classList.add("flipped-left");
            else if (dir === -1) sheetLeft.classList.add("flipped-right");
            setTimeout(() => {
                notebook.currentPagePair = nextPair;
                sheetRight.classList.remove("flipped-left"); sheetLeft.classList.remove("flipped-right");
                renderBook3D();
            }, 300);
        }

        function setActiveTargetPage(side) {
            userActiveSide = side;
            document.getElementById("pLeftFront").classList.toggle("active-target", side === 'left');
            document.getElementById("pRightFront").classList.toggle("active-target", side === 'right');
        }

        function renderBook3D() {
            let leftIdx = notebook.currentPagePair * 2, rightIdx = leftIdx + 1;
            document.getElementById("sheetLeft").classList.toggle("invisible-sheet", notebook.currentPagePair === 0);
            document.getElementById("sheetRight").classList.toggle("invisible-sheet", rightIdx >= notebook.pages.length - 1);
            fillFaceData("pLeftFront", leftIdx); fillFaceData("pRightFront", rightIdx);
            setActiveTargetPage(userActiveSide);
            
            let activeCover = notebook.pages[leftIdx]?.isCover ? notebook.pages[leftIdx] : (notebook.pages[rightIdx]?.isCover ? notebook.pages[rightIdx] : null);
            if (activeCover) {
                document.getElementById("coverConfigSection").style.display = "block";
                document.getElementById("coverTitleField").value = activeCover.title || "";
                document.getElementById("coverBgField").value = activeCover.bg || "#311b92";
            } else { document.getElementById("coverConfigSection").style.display = "none"; }
            document.getElementById("pageIndicator").innerText = `Cặp trang ${notebook.currentPagePair} / Tổng: ${notebook.pages.length - 4} trang`;
        }

        function fillFaceData(faceId, pageIdx) {
            const faceNode = document.getElementById(faceId); faceNode.innerHTML = "";
            let page = notebook.pages[pageIdx];
            if (!page || page.isBlankPlaceholder) { faceNode.style.backgroundColor = "transparent"; return; }
            faceNode.style.backgroundColor = page.bg || "#fcfbf7";

            if (page.isCover) {
                faceNode.classList.add("cover-style");
                let h3 = document.createElement("h3"); h3.innerText = page.title || "";
                h3.style.fontFamily = page.titleFont || "'Noto Sans VN'"; h3.style.fontSize = (page.titleSize || 32) + "px"; h3.style.color = page.titleColor || "#ffffff";
                faceNode.appendChild(h3);
            } else {
                faceNode.classList.remove("cover-style");
                faceNode.innerHTML = `<div class="page-num">Trang ${pageIdx - 1}</div>`;
                if(page.elements) Object.values(page.elements).forEach(el => buildDomElement(el, faceNode, pageIdx));
            }
        }

        function buildDomElement(data, parentContainer, pageIndex) {
            let el = document.createElement("div"); el.id = data.id; el.className = "element " + (selectedId === data.id ? "selected" : "");
            el.style.left = data.x + "px"; el.style.top = data.y + "px"; el.setAttribute("draggable", "true");
            el.addEventListener("dragstart", (e) => { e.dataTransfer.setData("text/plain", data.id); selectedId = data.id; });
            el.addEventListener("click", (e) => { e.stopPropagation(); setActiveTargetPage((pageIndex % 2 === 0) ? 'left' : 'right'); selectElement(data.id); });

            let del = document.createElement("div"); del.className = "delete-btn"; del.innerHTML = "X";
            del.addEventListener("mousedown", (e) => {
                e.stopPropagation(); delete notebook.pages[pageIndex].elements[data.id];
                selectedId = null; document.getElementById("editorPanel").style.display = 'none'; sync();
            });
            el.appendChild(del);

            let core;
            if (data.type === 'text') {
                core = document.createElement("div"); core.className = "element-text"; core.contentEditable = "true"; core.innerText = data.content;
                if(data.color) core.style.color = data.color; if(data.size) core.style.fontSize = data.size + "px"; if(data.font) core.style.fontFamily = data.font;
                core.addEventListener("blur", () => { notebook.pages[pageIndex].elements[data.id].content = core.innerText; sync(); });
            } else if (data.type === 'icon') {
                core = document.createElement("i"); core.className = data.content + " element-icon";
                if(data.color) core.style.color = data.color; if(data.size) core.style.fontSize = data.size + "px";
            } else if (data.type === 'image') {
                core = document.createElement("img"); core.className = "element-img"; core.src = data.content;
                if(data.size) core.style.width = data.size + "px";
            }
            el.appendChild(core); parentContainer.appendChild(el);
        }

        function addNewElement(type, content) {
            let targetPageIdx = (userActiveSide === 'left') ? notebook.currentPagePair * 2 : (notebook.currentPagePair * 2) + 1;
            if(!notebook.pages[targetPageIdx] || notebook.pages[targetPageIdx].isCover || notebook.pages[targetPageIdx].isBlankPlaceholder) return alert("Không thể thêm vào trang bìa!");
            let id = 'el_' + Date.now();
            if(!notebook.pages[targetPageIdx].elements) notebook.pages[targetPageIdx].elements = {};
            notebook.pages[targetPageIdx].elements[id] = { id: id, type: type, content: content, x: 50, y: 50, size: type==='image'?140:(type==='icon'?48:18), color:"#000000", font:"'Noto Sans VN'" };
            sync();
        }

        function updateCoverData() {
            let leftIdx = notebook.currentPagePair * 2, rightIdx = leftIdx + 1;
            let targetCover = notebook.pages[leftIdx]?.isCover ? notebook.pages[leftIdx] : (notebook.pages[rightIdx]?.isCover ? notebook.pages[rightIdx] : null);
            if(targetCover) {
                targetCover.title = document.getElementById("coverTitleField").value;
                targetCover.bg = document.getElementById("coverBgField").value;
                sync();
            }
        }

        function selectElement(id) { selectedId = id; document.querySelectorAll(".element").forEach(el => el.classList.remove("selected")); let node = document.getElementById(id); if(node) node.classList.add("selected"); document.getElementById("editorPanel").style.display = "block"; }
        function clearSelection(e) { if(e.target.classList.contains("book-container") || e.target.classList.contains("page-face")) { selectedId = null; document.querySelectorAll(".element").forEach(el => el.classList.remove("selected")); document.getElementById("editorPanel").style.display = "none"; } }
        allowDrop = (e) => e.preventDefault();
        function dropElement(e) {
            e.preventDefault(); let id = e.dataTransfer.getData("text/plain"); let rect = e.currentTarget.getBoundingClientRect();
            let x = e.clientX - rect.left - 20, y = e.clientY - rect.top - 20;
            for(let page of notebook.pages) { if(page.elements && page.elements[id]) { page.elements[id].x = Math.max(0, x); page.elements[id].y = Math.max(0, y); break; } }
            sync();
        }

        function applyFont(font) { if(selectedId) findAndModifyElement(selectedId, el => el.font = font); }
        function applySize(dir) { if(selectedId) findAndModifyElement(selectedId, el => el.size = Math.max(10, (el.size || 18) + dir)); }
        function applyColor(color) { if(selectedId) findAndModifyElement(selectedId, el => el.color = color); }
        function applyPageBg(color) { let idx = notebook.currentPagePair * 2; notebook.pages[idx].bg = color; notebook.pages[idx+1].bg = color; sync(); }
        function findAndModifyElement(id, callback) { for(let page of notebook.pages) { if(page.elements && page.elements[id]) { callback(page.elements[id]); sync(); break; } } }
        function addPagePair() { let leftIdx = notebook.currentPagePair * 2; notebook.pages.splice(leftIdx + 2, 0, { bg: "#fcfbf7", elements: {} }, { bg: "#fcfbf7", elements: {} }); sync(); }
        function deleteSinglePage(side) {
            let idx = (side === 'left') ? notebook.currentPagePair * 2 : (notebook.currentPagePair * 2) + 1;
            if (notebook.pages[idx].isCover || notebook.pages[idx].isBlankPlaceholder) return alert("Không thể xóa trang bìa!");
            if(confirm("Xóa nội dung trang này?")) { notebook.pages[idx] = { bg: "#fcfbf7", elements: {} }; sync(); }
        }
        function uploadLocalImage(e) { let file = e.target.files[0]; if (!file) return; let reader = new FileReader(); reader.onload = function(event) { addNewElement('image', event.target.result); }; reader.readAsDataURL(file); }

        window.onload = function() {
            initRoomConfig();
            connectRealtime();
        };
    </script>
</body>
</html>
